<div class="container text-white mt-5">
<div class="d-flex justify-content-between align-items-center mb-4">
      <h3 class="text-start">Todos los Productos</h3>
      <button class="btn btn-secondary">Ver todos</button>
    </div>
<div class="row justify-content-center text-center g-3">
  <div *ngFor="let producto of productosPaginados" class="col-md-3 mb-4 text-center">
    <img
      [src]="producto.imagenUrl"
      alt="{{ producto.nombre }}"
      class="circle-img mb-2"
      (error)="producto.imagenUrl = '/assets/images/default.webp'"
    />
    <p class="fw-bold">{{ producto.nombre }}</p>
    <p>{{ producto.precio | currency:'COP' }}</p>
    <button class="btn btn-primary">Comprar</button>
  </div>
</div>

<div class="d-flex justify-content-center align-items-center gap-3 mt-3">
  <button class="btn btn-outline-secondary" (click)="anterior()" [disabled]="paginaActual === 0">←</button>
  <span>Página {{ paginaActual + 1 }} de {{ totalPaginas }}</span>
  <button class="btn btn-outline-secondary" (click)="siguiente()" [disabled]="paginaActual >= totalPaginas - 1">→</button>
</div>
</div>
