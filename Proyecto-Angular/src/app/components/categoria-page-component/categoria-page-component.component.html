<div class="container text-white mt-5">
<div class="container mt-4">
  <h2 class="text-center mb-4">Productos {{ categoria }}</h2>
  <div class="row">
    <div *ngFor="let producto of productos" class="col-12 col-sm-6 col-md-3 mb-4 text-center">
      <img
        [src]="producto.imagenUrl"
        alt="{{ producto.nombre }}"
        class="circle-img mb-2"
        (error)="imagenError(producto)"
      />
      <p class="fw-bold">{{ producto.nombre }}</p>
      <p>{{ producto.precio | currency:'COP' }}</p>
      <button class="btn btn-primary">Comprar</button>
    </div>
  </div>
</div>
</div>
